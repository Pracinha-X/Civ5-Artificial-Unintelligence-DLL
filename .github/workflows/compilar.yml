name: Compilar IA DLL

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest # Usamos windows-latest para evitar problemas de disponibilidad con runners antiguos
    
    steps:
    - name: Descargar el codigo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    # Paso 1: Compilar utilidades primero si existen (ejemplo para CvGameCoreDLLUtil)
    # Si tu estructura requiere compilar Util antes, descomenta y ajusta:
    # - name: Compilar Utilidades
    #   run: msbuild CvGameCoreDLLUtil.sln /p:Configuration=Release /p:Platform=Win32

    # Paso 2: Buscar devenv.com y usarlo para compilar la solución antigua
    - name: Locate devenv.com
      shell: pwsh
      run: |
        $default = 'C:\Program Files (x86)\Microsoft Visual Studio 9.0\Common7\IDE\devenv.com'
        if (Test-Path $default) {
          Write-Host "Found devenv at $default"
          "DEVENV_PATH=$default" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          exit 0
        }
        $paths = Get-ChildItem 'C:\Program Files (x86)\Microsoft Visual Studio' -Filter devenv.com -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
        if (-not $paths) {
          throw 'devenv.com not found in Visual Studio installation paths'
        }
        $path = $paths[0]
        Write-Host "Found devenv at $path"
        "DEVENV_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build with devenv
      shell: pwsh
      run: |
        & "$env:DEVENV_PATH" CvGameCoreDLL.vs2008.sln /Build "Release|Win32"

    - name: Capturar todas las DLLs resultantes
      uses: actions/upload-artifact@v4
      with:
        name: IA_Modificada_DLLs
        path: |
          **\Release\*.dll
          !**\obj\** # Esto captura cualquier archivo .dll generado en carpetas Release, 
        # ignorando archivos temporales de compilación. 
