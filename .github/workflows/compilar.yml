name: Compilar IA DLL

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest # Usamos windows-latest para evitar problemas de disponibilidad con runners antiguos
    
    steps:
    - name: Descargar el codigo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    # Paso 1: Compilar utilidades primero si existen (ejemplo para CvGameCoreDLLUtil)
    # Si tu estructura requiere compilar Util antes, descomenta y ajusta:
    # - name: Compilar Utilidades
    #   run: msbuild CvGameCoreDLLUtil.sln /p:Configuration=Release /p:Platform=Win32

    # Paso 2: Compilar el proyecto principal directamente
    - name: Build with MSBuild
      run: |
        msbuild CvGameCoreDLL/CvGameCoreDLL.vcproj /p:Configuration=Release /p:Platform=Win32 /m
      # /m permite compilación en paralelo de los proyectos dentro de la solución

    - name: Capturar todas las DLLs resultantes
      uses: actions/upload-artifact@v4
      with:
        name: IA_Modificada_DLLs
        path: |
          **\Release\*.dll
          !**\obj\** # Esto captura cualquier archivo .dll generado en carpetas Release, 
        # ignorando archivos temporales de compilación. 
