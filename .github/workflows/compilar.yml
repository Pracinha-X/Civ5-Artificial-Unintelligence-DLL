name: Compilar IA DLL

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2019 # Usamos windows-2019 para disponer de compatibilidad con herramientas antiguas
    
    steps:
    - name: Descargar el codigo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup MSVC v90
      shell: pwsh
      run: |
        choco install visualstudio2019buildtools --package-parameters "--add Microsoft.VisualStudio.Component.VC.v90" -y

    # Paso 1: Compilar utilidades primero si existen (ejemplo para CvGameCoreDLLUtil)
    # Si tu estructura requiere compilar Util antes, descomenta y ajusta:
    # - name: Compilar Utilidades
    #   run: msbuild CvGameCoreDLLUtil.sln /p:Configuration=Release /p:Platform=Win32

    - name: Locate VS2019 MSBuild
      shell: pwsh
      run: |
        $paths = @(
          'C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\MSBuild\Current\Bin\MSBuild.exe',
          'C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\MSBuild\Current\Bin\MSBuild.exe',
          'C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\MSBuild.exe',
          'C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\MSBuild.exe'
        )
        $msbuild = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
        if (-not $msbuild) { throw 'MSBuild.exe not found in Visual Studio 2019 paths' }
        Write-Host "Found MSBuild at $msbuild"
        "MSBUILD_PATH=$msbuild" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build with VS2019 MSBuild
      shell: pwsh
      run: |
        & "$env:MSBUILD_PATH" CvGameCoreDLL.vs2008.sln /p:Configuration=Release /p:Platform=Win32 /m

    - name: Capturar todas las DLLs resultantes
      uses: actions/upload-artifact@v4
      with:
        name: IA_Modificada_DLLs
        path: |
          **\Release\*.dll
          !**\obj\** # Esto captura cualquier archivo .dll generado en carpetas Release, 
        # ignorando archivos temporales de compilación. 
